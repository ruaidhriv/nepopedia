name: Deploy Pages

on:
  push:
    branches: ["main"]

# Grant the required cryptographic tokens for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to avoid collision conflicts
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch ZIP Archive
        run: bash pull.sh

      - name: Unzip Site
        run: |
          if [ -f "dist.zip" ]; then
            unzip -o dist.zip -d .
            rm dist.zip
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
